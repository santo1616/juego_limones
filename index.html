<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atrapa Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciar()">
  <div class="contenedor">
    <div class="logo">
      <img src="logo 2026.png" alt="logo" />
    </div>
    <div class="tarjeta">
      <div class="cabecera">
        <span class="etiqueta">Juego Arcade</span>
        <h1>Atrapar Limones</h1>
        <p>Si del cielo te caen limones...</p>
        <h2>Autor Byron Fernandez</h2>
      </div>

      <div class="zona-juego">
        <canvas id="areaJuego" width="600" height="400"></canvas>
      </div>

      <div class="panel">
        <div class="dato">
          <span class="titulo-dato">Puntaje</span>
          <span class="valor-dato" id="txtPuntaje">0</span>
        </div>

        <div class="dato">
          <span class="titulo-dato">Vidas</span>
          <span class="valor-dato" id="txtVidas">3</span>
        </div>
      </div>

      <div class="botones">
        <button class="btn btn-azul" onclick="moverIzquierda();">Izquierda</button>
        <button class="btn btn-verde" onclick="moverDerecha();">Derecha</button>
        <button class="btn btn-naranja" onclick="reiniciar();">Reiniciar</button>
      </div>
    </div>
  </div>
  <script src="limones.js"></script>
</body>
</html>
